<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/litholens-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="LithoLens — AI-powered rock and mineral identification. Snap a photo, get instant analysis with smart Q&A narrowing. Works offline." />
    <meta name="theme-color" content="#05070d" id="theme-color-meta" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("litholens-theme");
          var light = t === "light";
          document.documentElement.setAttribute("data-theme", light ? "light" : "dark");
          var m = document.getElementById("theme-color-meta");
          if (m) m.setAttribute("content", light ? "#ebe0d1" : "#05070d");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <title>LithoLens — AI Rock & Mineral ID</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
